<!doctype html>
<html>
	<head>
		<meta content="text/html; charset=UTF-8" http-equiv="content-type" />
<meta name="viewport" content="width=device-width,initial-scale=1">
		<style>
		html,body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background-color: #f0f2f5;
		}
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            color: #fff;
        }
        .header .subtitle {
            margin: 6px 0 0;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
        .container {
            max-width: 1100px;
            margin: 20px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 24px;
            overflow: hidden;
        }
        #mycanvas {
            text-align: center;
            margin-top: 10px;
        }
		#mycanvas canvas, #mycanvas div{
			background-color:#fff;
			margin:0 auto;		
		}
		@media (max-width: 768px) {
			.container {
				padding: 15px;
				margin: 10px;
			}
		}
		</style>
		<script type="module">
			import jmChart from '../dist/jmchart.esm.js';
			(function load() {
				var w = Math.max((window.innerWidth || window.document.body.clientWidth) * 0.8, 500);
				var h = Math.min((window.innerHeight || window.document.body.clientHeight) * 0.5, 500);			
				inichart(w,h);
			})();
			

			function inichart(w, h) {

                    const datacount = 50;

					const chart = new jmChart('mycanvas', {
						width: w,
						height: h,
                        xField: 'x',
                        enableAnimate: true,
                        legendPosition: 'top',
                        legendVisible: false,
						minXValue : 0,
						maxXValue : 10,
                        xLabelFormat: (v, item, index) => {
                            if(index % 5 === 0) {
                                return v;
                            }  
                            return '';
                        },
                        style: {
							markLine: {
								x: false,
								y: true,
								stroke: 'red',
								fill: '#fff',
								lineWidth: 1,
							},
                            axis: {
								stroke: 'transparent',
								align: 'center',
                                grid: {
                                    x: false,
                                    y: true
                                }
                            },
                            chartArea: {
                                stroke: 'transparent'
                            },
                            margin: {
                                top: 30,
                                left: 50,
                                right: 10,
                                bottom: 30
                            }
                        }
					});				

					const line = chart.createSeries('range', {
						fields: [
							'min', 'max'
						],
						legendLabel: '温度范围',
                        yLabelFormat: (v) => {
                            return v.toFixed? (v.toFixed(0) + '°C') : v;
                        },
                        style: {
							showItem: false,
							color: '#F7BB98',													
							area: {
								fill: function(style) {
									return this.style.color;
								},
								shadow: function() {								
									return `0, 0, 20, #000`;
								},	
							}
                        }
					});
					
					
					function animate() {
                        chart.data = [];
                        for(var i = 0;i<datacount;i++) {
                            const baseTemp = 15 + i * 0.2;
                            const d = {
                                x : '0909' + i,
                                min :  baseTemp + Math.random() * 5,
                                max:  baseTemp + 10 + Math.random() * 5
                            };
                            
                            chart.data.push(d);
                        }
						
						chart.refresh();
						console.log(chart.data);
					}
					
					animate();
				}
		</script>
	</head>
	<body>
		<div class="header">
			<h1>范围图</h1>
			<p class="subtitle">范围图示例 - 温度范围展示，带阴影填充效果</p>
		</div>
		<div class="container">
			<div id="mycanvas">
			</div>	
		</div>
	</body>
</html>
